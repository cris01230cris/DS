<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vocabolario EN→IT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #000000;
    --surface: #16161a;
    --border: #2a2a32;
    --accent: #e8ff47;
    --accent2: #47ffe8;
    --text: #f0f0f0;
    --muted: #666;
    --error: #ff4747;
    --success: #47ff8a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 14px 20px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px),
                      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
  }

  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
  }

  .card-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: #aaa;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 10px;
  }

  .input-group label {
    font-size: 0.85rem;
    color: #ccc;
    font-weight: 600;
  }

  .input-group input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 1.2rem;
    padding: 9px 14px;
    width: 100%;
    outline: none;
    text-align: center;
    transition: border-color 0.2s;
  }

  .input-group input:focus {
    border-color: var(--accent);
  }

  .progress-bar-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .progress-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: #bbb;
    text-align: right;
    margin-top: 4px;
  }

  .word-category {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 8px;
  }

  .word-english {
    font-family: 'Space Mono', monospace;
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1.1;
    word-break: break-word;
    cursor: pointer;
  }

  .mic-area {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    transition: border-color 0.3s;
  }

  .mic-area.listening {
    border-color: var(--accent);
    animation: pulse-border 1.5s ease-in-out infinite;
  }

  @keyframes pulse-border {
    0%, 100% { border-color: var(--accent); box-shadow: 0 0 0 0 rgba(232,255,71,0.2); }
    50% { border-color: var(--accent); box-shadow: 0 0 0 8px rgba(232,255,71,0); }
  }

  .mic-wrap {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 150px;
    height: 150px;
  }
  
  .mic-ring-svg {
    position: absolute;
    top: 0; left: 0;
    width: 150px; height: 150px;
    pointer-events: none;
  }
  
  .mic-ring-bg { fill: none; stroke: #2a2a32; stroke-width: 6; }
  .mic-ring-fg {
    fill: none;
    stroke: #e8ff47;
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 440;
    stroke-dashoffset: 440;
    transform: rotate(-90deg);
    transform-origin: 50% 50%;
  }

  .mic-icon {
    width: 130px;
    height: 130px;
    position: relative;
    z-index: 1;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.8rem;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  
  .mic-icon:active { transform: scale(0.92); }
  .mic-area.listening .mic-icon {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }

  /* Waveform animation */
  .waveform {
    display: flex;
    gap: 4px;
    align-items: center;
    justify-content: center;
    height: 30px;
    margin-top: 5px;
  }
  .waveform .bar {
    width: 4px;
    height: 10px;
    background: var(--accent);
    border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite;
  }
  .waveform .bar:nth-child(1) { animation-delay: 0s; }
  .waveform .bar:nth-child(2) { animation-delay: 0.1s; }
  .waveform .bar:nth-child(3) { animation-delay: 0.2s; }
  .waveform .bar:nth-child(4) { animation-delay: 0.3s; }
  .waveform .bar:nth-child(5) { animation-delay: 0.4s; }
  @keyframes wave {
    0%, 100% { height: 8px; }
    50% { height: 22px; }
  }

  .mic-status {
    font-size: 0.78rem;
    color: var(--muted);
    text-align: center;
  }

  .mic-area.listening .mic-status {
    color: var(--accent);
  }

  .transcript-preview {
    font-size: 0.9rem;
    color: var(--text);
    text-align: center;
    font-style: italic;
    min-height: 1.2em;
    background: rgba(255,255,255,0.05);
    padding: 6px 12px;
    border-radius: 20px;
    margin-top: 5px;
  }

  .feedback {
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.25s, transform 0.25s;
  }

  .feedback.show {
    opacity: 1;
    transform: translateY(0);
  }

  .feedback.correct {
    background: rgba(71, 255, 138, 0.08);
    border: 1px solid rgba(71, 255, 138, 0.3);
    color: var(--success);
  }

  .feedback.wrong {
    background: rgba(255, 71, 71, 0.08);
    border: 1px solid rgba(255, 71, 71, 0.3);
    color: var(--error);
  }

  .feedback-icon { font-size: 1.2rem; }
  .feedback-text { flex: 1; line-height: 1.4; }

  .drill-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,71,71,0.1);
    border: 1px solid rgba(255,71,71,0.3);
    border-radius: 20px;
    padding: 4px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--error);
  }

  .drill-counter {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 8px;
  }
  .drill-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
  }
  .drill-dot.filled { background: var(--accent2); }

  .btn {
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.88rem;
    padding: 11px 16px;
    transition: all 0.15s;
    width: 100%;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: var(--accent);
    color: var(--bg);
  }
  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .arr { color: var(--accent); font-weight: 700; }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 4px;
  }
  .stat-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-label {
    font-size: 0.7rem;
    color: #bbb;
    font-weight: 600;
    margin-top: 4px;
    text-transform: uppercase;
  }

  .cat-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 13px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .cat-toggle.selected {
    border-color: var(--accent);
    background: rgba(232,255,71,0.05);
  }
  .cat-toggle-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    text-transform: capitalize;
  }
  .cat-toggle-check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    transition: all 0.2s;
  }
  .cat-toggle.selected .cat-toggle-check {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }

  .speak-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: #ddd;
    cursor: pointer;
    font-size: 0.9rem;
    padding: 7px 16px;
    margin-top: 8px;
    font-weight: 600;
    width: 100%;
  }
  .speak-btn:active { background: rgba(255,255,255,0.1); }

  .manual-input {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .manual-input input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 1rem;
    padding: 10px 14px;
    width: 100%;
    outline: none;
    font-family: 'DM Sans', sans-serif;
  }
  .manual-input input:focus { border-color: var(--accent); }

  .error-msg {
    color: var(--error);
    font-size: 0.78rem;
    text-align: center;
    padding: 8px;
    display: none;
  }
  .error-msg.show { display: block; }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #000;
    padding: 10px 20px;
    border-radius: 30px;
    font-weight: bold;
    z-index: 1000;
    animation: fadeOut 2s ease forwards;
    pointer-events: none;
    white-space: nowrap;
  }
  @keyframes fadeOut {
    0% { opacity: 1; }
    70% { opacity: 1; }
    100% { opacity: 0; visibility: hidden; }
  }
</style>
</head>
<body>
<div class="container">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0 10px;">
    <span id="mode-label" style="font-weight:600;font-size:1rem;color:var(--accent);">EN → IT</span>
    <span style="font-size:0.75rem;color:var(--muted);">DS2604181411</span>
  </div>

  <!-- SETUP SCREEN -->
  <div id="screen-setup" class="screen active">
    <div class="card">
      <div class="input-group">
        <label>Da quale lemma vuoi iniziare? (1 – 1000)</label>
        <input type="number" id="input-S" min="1" max="1000" placeholder="1" inputmode="numeric" value="1">
      </div>
      <div class="input-group">
        <label>Quante parole vuoi tradurre?</label>
        <input type="number" id="input-W" min="1" max="100" placeholder="10" inputmode="numeric" value="10">
      </div>
      <div id="setup-error" class="error-msg"></div>
    </div>
    <div style="display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:8px;">
      <button id="btn-mode-en" onclick="setMode('en')" style="flex:1;padding:12px 8px;border:none;cursor:pointer;font-weight:700;font-size:1rem;color:#000;background:var(--accent);">EN → IT</button>
      <button id="btn-mode-it" onclick="setMode('it')" style="flex:1;padding:12px 8px;border:none;cursor:pointer;font-weight:700;font-size:1rem;color:#888;background:var(--surface);">IT → EN</button>
    </div>
    <button class="btn btn-primary" onclick="startExercise()" style="color:#000;font-weight:700;">Inizia esercizio <span class="arr">→</span></button>
    <button class="btn btn-secondary" onclick="loadProgress()" style="margin-top:5px;">↻ Riprendi ultimo esercizio</button>
  </div>

  <!-- CATEGORY SCREEN -->
  <div id="screen-cats" class="screen">
    <div class="card"><div id="cat-list" style="display:flex;flex-direction:column;gap:12px;"></div></div>
    <button class="btn btn-primary" onclick="confirmCats()" style="color:#000;font-weight:700;">Conferma →</button>
    <button class="btn btn-secondary" onclick="showScreen('screen-setup')">← Torna</button>
  </div>

  <!-- EXERCISE SCREEN -->
  <div id="screen-exercise" class="screen">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <div id="ex-progress-label" class="progress-text" style="margin:0;text-align:left;"></div>
        <div id="drill-badge" class="drill-badge" style="display:none;">⚡ DRILL <span id="drill-count">0</span></div>
      </div>
      <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
      <div style="margin-top:6px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div class="word-category" id="word-category"></div>
          <button onclick="stopExercise()" style="background:var(--accent);color:#000;border:none;border-radius:6px;padding:3px 10px;font-weight:700;cursor:pointer;">STOP</button>
        </div>
        <div class="word-english" id="word-english" onclick="toggleWordVisibility()"></div>
        <button class="speak-btn" onclick="speakCurrentWord()" style="background:var(--accent);color:#000;border:none;">🔊 Riascolta</button>
      </div>
    </div>

    <div class="mic-area" id="mic-area">
      <div class="mic-wrap" onclick="toggleListening()">
        <div class="mic-icon" id="mic-icon">🎤</div>
        <svg class="mic-ring-svg" viewBox="0 0 150 150">
          <circle class="mic-ring-bg" cx="75" cy="75" r="70"/>
          <circle class="mic-ring-fg" id="mic-ring" cx="75" cy="75" r="70"/>
        </svg>
      </div>
      <div class="waveform" id="waveform" style="display:none;">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
      <div class="mic-status" id="mic-status">Tocca per rispondere</div>
      <div class="transcript-preview" id="transcript-preview"></div>
    </div>

    <div class="manual-input" id="manual-input">
      <input type="text" id="manual-text" placeholder="Scrivi la traduzione..." autocomplete="off" spellcheck="false">
      <button class="btn btn-primary" onclick="submitManual()" style="color:#000;font-weight:700;padding:14px;">Conferma</button>
    </div>

    <div class="feedback" id="feedback">
      <div class="feedback-icon" id="feedback-icon"></div>
      <div class="feedback-text" id="feedback-text"></div>
    </div>
  </div>

  <!-- DRILL CONFIRM SCREEN -->
  <div id="screen-drill-confirm" class="screen">
    <div class="card">
      <div class="card-label">Drill · Parole sbagliate</div>
      <p style="font-size:0.95rem; margin-bottom:8px;">Vuoi consolidare le <span id="drill-confirm-count" style="color:var(--error); font-weight:700;"></span> parole sbagliate?</p>
      <p style="font-size:0.78rem; color:var(--muted);">Ogni parola va tradotta correttamente 3 volte di fila.</p>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="confirmDrill(true)">Sì, procedi</button>
      <button class="btn btn-secondary" onclick="confirmDrill(false)">No, salta</button>
    </div>
  </div>

  <!-- DRILL SCREEN -->
  <div id="screen-drill" class="screen">
    <div class="card">
      <div class="card-label">Drill · Parole sbagliate</div>
      <div style="display:flex;justify-content:space-between;">
        <div class="word-category" id="drill-category"></div>
        <button onclick="stopExercise()" style="background:var(--accent);color:#000;border:none;border-radius:6px;padding:3px 10px;font-weight:700;cursor:pointer;">STOP</button>
      </div>
      <div class="word-english" id="drill-word" onclick="toggleWordVisibility()"></div>
      <button class="speak-btn" onclick="speakDrillWord()" style="background:var(--accent);color:#000;border:none;">🔊 Riascolta</button>
      <div class="drill-counter" id="drill-dots"></div>
    </div>
    <div class="mic-area" id="drill-mic-area">
      <div class="mic-wrap" onclick="toggleDrillListening()">
        <div class="mic-icon" id="drill-mic-icon">🎤</div>
        <svg class="mic-ring-svg" viewBox="0 0 150 150">
          <circle class="mic-ring-bg" cx="75" cy="75" r="70"/>
          <circle class="mic-ring-fg" id="drill-mic-ring" cx="75" cy="75" r="70"/>
        </svg>
      </div>
      <div class="waveform" id="drill-waveform" style="display:none;">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
      <div class="mic-status" id="drill-mic-status">Tocca per rispondere</div>
      <div class="transcript-preview" id="drill-transcript"></div>
    </div>
    <div class="manual-input" id="drill-manual-input">
      <input type="text" id="drill-manual-text" placeholder="Scrivi la traduzione...">
      <button class="btn btn-primary" onclick="submitDrillManual()" style="color:#000;font-weight:700;">Conferma</button>
    </div>
    <div class="feedback" id="drill-feedback">
      <div class="feedback-icon" id="drill-feedback-icon"></div>
      <div class="feedback-text" id="drill-feedback-text"></div>
    </div>
  </div>

  <!-- END SCREEN -->
  <div id="screen-end" class="screen">
    <div class="card">
      <div class="card-label">Risultati</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-value" id="stat-correct">0</div><div class="stat-label">Corrette</div></div>
        <div class="stat-box"><div class="stat-value" id="stat-wrong">0</div><div class="stat-label">Sbagliate</div></div>
        <div class="stat-box"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Totale</div></div>
        <div class="stat-box"><div class="stat-value" id="stat-pct">0%</div><div class="stat-label">Score</div></div>
      </div>
    </div>
    <button class="btn btn-primary" onclick="repeatSame()"><span class="arr">↻</span> Stesse parole</button>
    <button class="btn btn-secondary" onclick="repeatNew()">Parole nuove →</button>
    <button class="btn btn-secondary" onclick="goHome()">← Dall'inizio</button>
    <button class="btn btn-secondary" style="margin-top:12px;" onclick="terminateExercise()">✕ Termina</button>
  </div>
</div>

<script>
// ==================== WORD LIST (1000 lemmi unici) ====================

    const row = RAW[i];
    if (selectedCats.has(row[3])) eligible.push(row);
  }
  const selected = eligible.slice(0, W);
  return shuffle(selected);
}

function shuffle(arr) {
  const result = [...arr];
  for (let i = result.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [result[i], result[j]] = [result[j], result[i]];
  }
  return result;
}

function buildCatScreen() {

  sorted.forEach(cat => {

    div.onclick = () => toggleCat(cat, div);

async function speakAsyncLang(text, lang) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  return new Promise(resolve => {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = lang;
    utterance.rate = lang.startsWith('en') ? 0.7 : 0.85;
    utterance.onend = resolve;
    utterance.onerror = resolve;
    window.speechSynthesis.speak(utterance);
    setTimeout(resolve, Math.max(1500, text.length * 100));
  });
}

function playMicSound(on) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.5, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.15);
    osc.frequency.setValueAtTime(on ? 880 : 440, ctx.currentTime);
    osc.type = 'sine';
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.15);
    osc.onended = () => ctx.close();
  } catch(e) {}
}

async function startListening(isDrillMode = false) {
  if (!speechSupported) {
    showToast('Il tuo browser non supporta il riconoscimento vocale');
    return;
  }
  if (isDrillMode ? drillMicActive : micActive) return;
  
  const hasPermission = await requestMicrophonePermission();
  if (!hasPermission) return;
  
  if (isDrillMode) {
    drillMicActive = true;

    currentTranscript = '';
    document.getElementById('drill-transcript').textContent = '';
    document.getElementById('drill-mic-area').classList.add('listening');
    document.getElementById('drill-mic-status').textContent = 'In ascolto...';
    document.getElementById('drill-mic-icon').textContent = '⏹';
    document.getElementById('drill-mic-icon').style.background = '#1a1a00';
    showWaveform(true, true);
    playMicSound(true);
    startRing('drill-mic-ring');
    
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    currentRecognition = new SR();
    currentRecognition.lang = exerciseMode === 'en' ? 'it-IT' : 'en-US';
    currentRecognition.continuous = false;
    currentRecognition.interimResults = true;
    
    currentRecognition.onresult = (e) => {
      let final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) final += e.results[i][0].transcript;
        else currentTranscript = e.results[i][0].transcript;
      }
      if (final) {
        currentTranscript = final;
        document.getElementById('drill-transcript').textContent = final;
        stopListening(true);
        evaluateAnswer(final.trim().toLowerCase(), true);
      } else {
        document.getElementById('drill-transcript').textContent = currentTranscript;
      }
    };
    
    currentRecognition.onend = () => {
      if (drillMicActive && isWaitingForAnswer) {
        stopListening(true);
        if (currentTranscript.trim()) {
          evaluateAnswer(currentTranscript.trim().toLowerCase(), true);
        }
      }
    };
    
    currentRecognition.onerror = () => {
      if (drillMicActive && isWaitingForAnswer) stopListening(true);
    };
    
    currentRecognition.start();
    setTimeout(() => { if (drillMicActive && isWaitingForAnswer) stopListening(true); }, 10000);
  } else {
    micActive = true;
    isWaitingForAnswer = true;
    currentTranscript = '';
    document.getElementById('transcript-preview').textContent = '';
    document.getElementById('mic-area').classList.add('listening');
    document.getElementById('mic-status').textContent = 'In ascolto...';
    document.getElementById('mic-icon').textContent = '⏹';
    document.getElementById('mic-icon').style.background = '#1a1a00';
    showWaveform(true, false);
    playMicSound(true);
    startRing('mic-ring');
    
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    currentRecognition = new SR();
    currentRecognition.lang = exerciseMode === 'en' ? 'it-IT' : 'en-US';
    currentRecognition.continuous = false;
    currentRecognition.interimResults = true;
    
    currentRecognition.onresult = (e) => {
      let final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) final += e.results[i][0].transcript;
        else currentTranscript = e.results[i][0].transcript;
      }
      if (final) {
        currentTranscript = final;
        document.getElementById('transcript-preview').textContent = final;
        stopListening(false);
        evaluateAnswer(final.trim().toLowerCase(), false);
      } else {
        document.getElementById('transcript-preview').textContent = currentTranscript;
      }
    };
    
    currentRecognition.onend = () => {
      if (micActive && isWaitingForAnswer) {
        stopListening(false);
        if (currentTranscript.trim()) {
          evaluateAnswer(currentTranscript.trim().toLowerCase(), false);
        }
      }
    };
    
    currentRecognition.onerror = () => {
      if (micActive && isWaitingForAnswer) stopListening(false);
    };
    
    currentRecognition.start();
    setTimeout(() => { if (micActive && isWaitingForAnswer) stopListening(false); }, 10000);
  }
}

function normalize(s) {
  return s.toLowerCase()
    .replace(/[àáâãä]/g,'a').replace(/[èéêë]/g,'e')
    .replace(/[ìíîï]/g,'i').replace(/[òóôõö]/g,'o')
    .replace(/[ùúûü]/g,'u').replace(/[ç]/g,'c')
    .replace(/[^a-z0-9\s]/g,'').trim();
}

function levenshtein(a, b) {
  if (a.length > 8 || b.length > 8) return Math.abs(a.length - b.length);
  const dp = Array.from({length: a.length+1}, (_, i) => 
    Array.from({length: b.length+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= a.length; i++)
    for (let j = 1; j <= b.length; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] :
        1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[a.length][b.length];
}

function isCorrectAnswer(answer, translations) {
  const answerParts = answer.split(/[,;]+/).map(p => p.trim()).filter(p => p.length > 0);
  for (const part of answerParts) {
    const ansNorm = normalize(part);
    if (ansNorm.length === 0) continue;
    for (const t of translations) {
      const nt = normalize(t);
      if (nt === ansNorm) return true;
      if (ansNorm.length > 3 && levenshtein(ansNorm, nt) <= 1) return true;
      if (nt.split(/\s+/).includes(ansNorm)) return true;
    }
  }
  return false;
}

function evaluateAnswer(answer, isDrill) {
  if (!isWaitingForAnswer && !isDrill) return;
  isWaitingForAnswer = false;
  
  if (answer === 'stop' || answer === 'stopp') {
    stopListening(false);
    stopListening(true);
    showEnd();
    return;
  }
  
  const w = isDrill ? drillCurrentWord.word : words[currentIdx];
  let translations, display;
  if (exerciseMode === 'en') {
    translations = w[4].split(';').map(t => t.trim().toLowerCase());
    display = (w[3] === 'verbo') ? 'To ' + w[1] : w[1];
  } else {
    const verb = w[3] === 'verbo';
    translations = [w[1].toLowerCase()];
    if (verb) translations.push(('to ' + w[1]).toLowerCase());
    display = (verb ? 'To ' + w[1] : w[1]);
  }
  
  const correct = isCorrectAnswer(answer, translations);
  
  if (isDrill) {
    showDrillFeedback(correct, w, display);
    if (correct) {
      drillCurrentWord.counter++;
      if (drillCurrentWord.counter >= 3) {
        drill = drill.filter(d => d !== drillCurrentWord);
      }
    } else {
      drillCurrentWord.counter = 0;
    }
  } else {
    if (!correct) {
      const existing = drill.find(d => d.word[0] === w[0]);
      if (!existing) drill.push({word: w, counter: 0});
    }
    if (correct) stats.correct++; else stats.wrong++;
    saveProgress();
    showFeedback(correct, w, display);
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function saveProgress() {
  const progress = {
    S, W,
    currentIdx,
    stats,
    drill: drill.map(d => ({ wordId: d.word[0], counter: d.counter })),
    wordIds: words.map(w => w[0]),
    exerciseMode,
    selectedCats: Array.from(selectedCats),
    timestamp: Date.now()
  };
  localStorage.setItem('vocabProgress', JSON.stringify(progress));
}

function loadProgress() {
  const saved = localStorage.getItem('vocabProgress');
  if (!saved) {
    showToast('Nessun esercizio salvato');
    return false;
  }
  try {
    const p = JSON.parse(saved);
    if (Date.now() - p.timestamp > 24 * 60 * 60 * 1000) {
      showToast('Esercizio scaduto (più di 24 ore)');
      return false;
    }
    S = p.S; W = p.W;
    stats = p.stats;
    exerciseMode = p.exerciseMode;
    setMode(exerciseMode);
    selectedCats = new Set(p.selectedCats);
    const wordMap = new Map(RAW.map(w => [w[0], w]));
    words = p.wordIds.map(id => wordMap.get(id)).filter(w => w);
    if (words.length === 0) return false;
    currentIdx = p.currentIdx;
    drill = p.drill.map(d => ({ word: wordMap.get(d.wordId), counter: d.counter })).filter(d => d.word);
    if (currentIdx >= words.length) return false;
    showScreen('screen-exercise');
    showWord();
    showToast('Esercizio ripristinato!');
    return true;
  } catch(e) { 
    showToast('Errore nel ripristino');
    return false; 
  }
}

function nextWord() {
  currentIdx++;
  if (currentIdx >= words.length) {
    if (drill.length > 0) {
      startDrill();
    } else {
      showEnd();
    }
  } else {
    showWord();
  }
}

function nextDrillWord() {
  if (drill.length === 0) { showEnd(); return; }
  drillCurrentWord = drill[Math.floor(Math.random() * drill.length)];
  const w = drillCurrentWord.word;
  const catLabel = w[3].charAt(0).toUpperCase() + w[3].slice(1);
  const display = (w[3] === 'verbo') ? 'To ' + w[1] : w[1];
  
  document.getElementById('drill-category').textContent = catLabel;
  if (exerciseMode === 'en') {
    setWordText('drill-word', display);
  } else {
    const firstTrans = w[4].split(';')[0].trim();
    setWordText('drill-word', firstTrans);
  }
  
  const dotsEl = document.getElementById('drill-dots');
  dotsEl.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement('div');
    dot.className = 'drill-dot' + (i < drillCurrentWord.counter ? ' filled' : '');
    dotsEl.appendChild(dot);
  }
  
  hideFeedback('drill-feedback');
  document.getElementById('drill-transcript').textContent = '';
  
  setTimeout(async () => {
    const drillSpoken = exerciseMode === 'en' ? display : w[4].split(';')[0].trim();
    const lang = exerciseMode === 'en' ? 'en-US' : 'it-IT';
    await speakAsyncLang(drillSpoken, lang);
    await sleep(2000);
    playMicSound(true);
    startListening(true);
  }, 300);
}

function showWord() {
  const w = words[currentIdx];
  const catLabel = w[3].charAt(0).toUpperCase() + w[3].slice(1);
  const display = (w[3] === 'verbo') ? 'To ' + w[1] : w[1];
  
  if (exerciseMode === 'en') {
    document.getElementById('word-category').textContent = catLabel;
    setWordText('word-english', display);
  } else {
    const firstTrans = w[4].split(';')[0].trim();
    document.getElementById('word-category').textContent = catLabel;
    setWordText('word-english', firstTrans);
  }
  
  const pct = (currentIdx / W) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('ex-progress-label').textContent = `Parola ${currentIdx + 1} di ${W} da ${S}`;
  
  const db = document.getElementById('drill-badge');
  if (drill.length > 0) {
    db.style.display = 'flex';
    document.getElementById('drill-count').textContent = drill.length;
  } else {
    db.style.display = 'none';
  }

  hideFeedback('feedback');
  document.getElementById('transcript-preview').textContent = '';
  document.getElementById('mic-icon').textContent = '🎤';
  document.getElementById('mic-icon').style.background = 'var(--surface)';
  document.getElementById('mic-area').classList.remove('listening');
  micActive = false;

  setTimeout(async () => {
    const spokenText = exerciseMode === 'en' ? display : words[currentIdx][4].split(';')[0].trim();
    const lang = exerciseMode === 'en' ? 'en-US' : 'it-IT';
    await speakAsyncLang(spokenText, lang);
    await sleep(2000);
    playMicSound(true);
    startListening(false);
  }, 300);
}

function startDrill() {
  if (drill.length === 0) { showEnd(); return; }
  document.getElementById('drill-confirm-count').textContent = drill.length;
  showScreen('screen-drill-confirm');
}

function confirmDrill(yes) {
  if (yes) {
    showScreen('screen-drill');
    nextDrillWord();
  } else {
    showEnd();
  }
}

function showEnd() {
  stopListening(false);
  stopListening(true);
  const total = stats.correct + stats.wrong;
  const pct = total > 0 ? Math.round((stats.correct / total) * 100) : 0;
  document.getElementById('stat-correct').textContent = stats.correct;
  document.getElementById('stat-wrong').textContent = stats.wrong;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-pct').textContent = pct + '%';
  showScreen('screen-end');
}

function repeatSame() {
  words = getWords(S, W);
  W = words.length;
  currentIdx = 0; drill = []; stats = {correct:0, wrong:0};
  saveProgress();
  showScreen('screen-exercise');
  showWord();
}

function repeatNew() {
  S = S + Math.floor(W / 2);
  if (S > 1000) S = 1;
  words = getWords(S, W);
  W = words.length;
  currentIdx = 0; drill = []; stats = {correct:0, wrong:0};
  saveProgress();
  showScreen('screen-exercise');
  showWord();
}

function goHome() {
  stopListening(false);
  stopListening(true);
  showScreen('screen-setup');
}

function terminateExercise() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  stopListening(false);
  stopListening(true);
  localStorage.removeItem('vocabProgress');
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const endDiv = document.createElement('div');
  endDiv.style.cssText = 'text-align:center;padding:60px 20px;font-family:Space Mono,monospace;color:var(--accent);font-size:1.2rem;';
  endDiv.innerHTML = 'Esercizio terminato.<br><br><button class="btn btn-secondary" style="margin-top:20px;" onclick="location.reload()"><span class="arr">↺</span> Ricomincia</button>';
  document.querySelector('.container').appendChild(endDiv);
}

function stopExercise() {
  stopListening(false);
  stopListening(true);
  showEnd();
}

window.onload = function() {
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    speechSupported = true;
  }
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
  }
};
</script>
</body>
</html>
